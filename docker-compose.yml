services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-cakto}
      POSTGRES_USER: ${DB_USER:-cakto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cakto}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
